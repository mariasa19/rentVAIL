  searchInput.addEventListener('input', () => { state.search = searchInput.value; refresh(); });
  searchInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') { searchInput.value=''; state.search=''; refresh(); } if (e.key === 'Enter') { const vis = getVisible(); if (vis.length) { const u = vis[0]; const m = markers[u.id]; if (m && !map.hasLayer(m)) m.addTo(map); map.flyTo([u.latitude, u.longitude], 15, { duration: 0.8 }); setTimeout(() => m && m.openPopup(), 850); } } });
  const toggle = document.getElementById('rv-inactive-toggle');
  toggle.addEventListener('click', () => { state.showInactive = !state.showInactive; toggle.classList.toggle('on', state.showInactive); refresh(); });
  const legend = document.getElementById('rv-legend');
  legend.innerHTML = '<div class="rv-l-title">Unit Map Key</div><div class="rv-l-row"><span class="rv-l-dot" style="background:'+RV.cta+'"></span>Vail</div><div class="rv-l-row"><span class="rv-l-dot" style="background:'+RV.sable+'"></span>Beaver Creek</div><div class="rv-l-row" id="rv-l-inactive" style="display:none;"><span class="rv-l-dot rv-l-ring"></span>Inactive</div>';
  setTimeout(() => map.invalidateSize(), 100);
})();
</script>
</body>
</html>
